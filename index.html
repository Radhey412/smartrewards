<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartRewards - Share & Earn</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 24px; font-weight: bold; color: #1a237e; }
        .hero-banner { width: 90%; max-width: 1200px; margin: 20px auto; background: linear-gradient(135deg, #1a237e, #2e7d32); color: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hero-banner h1 { margin-bottom: 10px; font-size: 28px; }
        .main-container { width: 90%; max-width: 1200px; margin: 30px auto; }
        .section-title { font-size: 22px; margin-bottom: 15px; color: #1a237e; font-weight: 700; }
        .offers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .offer-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .offer-title { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .profit-tag { color: #2e7d32; font-weight: bold; font-size: 16px; margin-bottom: 15px; background: #e8f5e9; padding: 5px; border-radius: 5px; }
        .share-btn { background: #2e7d32; color: #fff; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: 600; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">✨ SmartRewards</div>
        <div style="font-weight: 600; color: #2e7d32;">Wallet: ₹0.00</div>
    </header>

    <div class="hero-banner">
        <h1>Share Links & Earn Daily Cash!</h1>
        <p>Flipkart, Meesho, Credit Cards aur Demat Accounts share karke paise kamayein.</p>
    </div>

    <div class="main-container">
        <h2 class="section-title">Trending Offers</h2>
        <div class="offers-grid">
            
            <div class="offer-card">
                <div class="offer-title">Flipkart Shopping</div>
                <div class="profit-tag">Up to 12% Profit</div>
                <a href=https://fktr.in/5vr34OD target="_blank">
    <button class="share-btn">Share & Earn</button>
</a>
            </div>

            <div class="offer-card">
                <div class="offer-title">AU Credit Card</div>
                <div class="profit-tag">Flat ₹1500 Profit</div>
                <a href=https://bitli.in/dccY8Xf target="_blank">
    <button class="share-btn">Share & Earn</button>
</a>
            </div>

            <div class="offer-card">
                <div class="offer-title">Angel One Demat</div>
                <div class="profit-tag">Flat ₹400 Profit</div>
                <a href=https://bitli.in/O7GnqtAtarget="_blank">
    <button class="share-btn">Share & Earn</button>
</a>
            </div>

        </div>
    </div>

</body>
</html>
